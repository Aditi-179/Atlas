<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Health OS 🛡️ - Decision Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">🛡️ Aegis Health OS</h1>
            <span class="text-sm bg-blue-600 px-3 py-1 rounded-full text-blue-100">Groq LLM Powered</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">

        <!-- Left Column: Patient Input Form -->
        <div class="lg:col-span-4 bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-fit">
            <h2 class="text-lg font-semibold mb-4 border-b pb-2">Patient Clinical Data</h2>

            <form id="clinicalForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 uppercase">Age</label>
                        <input type="number" id="age" value="55"
                            class="mt-1 w-full p-2 border rounded-md bg-gray-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                            required>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 uppercase">Gender</label>
                        <select id="gender"
                            class="mt-1 w-full p-2 border rounded-md bg-gray-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 uppercase">Systolic BP</label>
                        <input type="number" id="sys_bp" value="150"
                            class="mt-1 w-full p-2 border rounded-md bg-gray-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                            required>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 uppercase">BMI</label>
                        <input type="number" id="bmi" value="29.5" step="0.1"
                            class="mt-1 w-full p-2 border rounded-md bg-gray-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
                            required>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 uppercase">Smoking</label>
                        <select id="smoking"
                            class="mt-1 w-full p-2 border rounded-md bg-gray-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="Never">Never</option>
                            <option value="Former">Former</option>
                            <option value="Current" selected>Current</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 uppercase">Diet</label>
                        <select id="diet"
                            class="mt-1 w-full p-2 border rounded-md bg-gray-50 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="Healthy">Healthy</option>
                            <option value="High Sodium" selected>High Sodium</option>
                            <option value="High Sugar">High Sugar</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-500 uppercase">ML Risk Tier</label>
                    <select id="risk_tier"
                        class="mt-1 w-full p-2 border rounded-md text-sm font-semibold focus:ring-2 focus:ring-blue-500 outline-none text-red-700 bg-red-50 border-red-200">
                        <option value="Green" class="text-green-700">Green (Low)</option>
                        <option value="Yellow" class="text-yellow-700">Yellow (Moderate)</option>
                        <option value="Red" class="text-red-700" selected>Red (High Risk)</option>
                    </select>
                </div>

                <button type="submit"
                    class="w-full mt-6 bg-slate-900 hover:bg-slate-800 text-white font-medium py-2.5 rounded-md transition-colors flex justify-center items-center">
                    <span id="btnText">Generate IDSS Protocol</span>
                    <div id="loadingSpinner" class="hidden loader border-4 border-gray-400 rounded-full w-5 h-5 ml-2">
                    </div>
                </button>
            </form>
        </div>

        <!-- Right Column: AI Output -->
        <div class="lg:col-span-8 bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
            <h2 class="text-lg font-semibold mb-4 border-b pb-2 flex items-center justify-between">
                <span>AI-Generated Care Protocol</span>
                <span
                    class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded border border-green-200">Evidence-Grounded
                    (RAG)</span>
            </h2>

            <div id="outputArea" class="flex-grow flex flex-col justify-center items-center text-gray-400">
                <svg class="w-16 h-16 mb-4 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                    </path>
                </svg>
                <p>Awaiting patient data...</p>
            </div>

            <div id="resultsArea" class="hidden flex-col h-full">
                <div class="bg-blue-50 border border-blue-100 p-4 rounded-lg mb-6">
                    <h3 class="text-xs font-bold text-blue-800 uppercase mb-1">Patient Summary</h3>
                    <p id="aiSummary" class="text-sm text-blue-900"></p>
                </div>

                <h3 class="text-sm font-bold text-gray-700 uppercase mb-3">Actionable Steps</h3>
                <div id="actionStepsContainer" class="space-y-4 overflow-y-auto pr-2 pb-4">
                    <!-- Steps injected here via JS -->
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('clinicalForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            const outputArea = document.getElementById('outputArea');
            const resultsArea = document.getElementById('resultsArea');
            const stepsContainer = document.getElementById('actionStepsContainer');

            btnText.innerText = "Analyzing Context...";
            spinner.classList.remove('hidden');
            outputArea.classList.add('hidden');
            resultsArea.classList.add('hidden');
            stepsContainer.innerHTML = '';

            const payload = {
                patient_id: "PT-" + Math.floor(Math.random() * 10000),
                age: parseInt(document.getElementById('age').value),
                gender: document.getElementById('gender').value,
                vitals: {
                    systolic_bp: parseInt(document.getElementById('sys_bp').value),
                    bmi: parseFloat(document.getElementById('bmi').value)
                },
                habits: {
                    smoking: document.getElementById('smoking').value,
                    diet: document.getElementById('diet').value
                },
                risk_tier: document.getElementById('risk_tier').value
            };

            try {
                const response = await fetch('/api/v1/decision-support/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("Backend API Error");
                const data = await response.json();

                document.getElementById('aiSummary').innerText = data.summary;

                data.protocol_steps.forEach((step, index) => {
                    const urgencyColor = step.urgency.toLowerCase().includes('immediate') ? 'bg-red-100 text-red-700 border-red-200' : 'bg-yellow-100 text-yellow-700 border-yellow-200';
                    const categoryIcon = step.category.toLowerCase().includes('lifestyle') ? '🥗' : (step.category.toLowerCase().includes('referral') ? '🏥' : '🗣️');

                    const stepHTML = `
                        <div class="p-4 border border-gray-200 rounded-lg bg-white shadow-sm hover:shadow-md transition-shadow">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-bold uppercase text-gray-500">${categoryIcon} Step ${index + 1}: ${step.category}</span>
                                <span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded border ${urgencyColor}">${step.urgency}</span>
                            </div>
                            <p class="text-gray-800 text-sm font-medium mb-3">${step.action}</p>
                            <div class="text-xs text-gray-400 flex items-center">
                                <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                Source: ${step.evidence_citation}
                            </div>
                        </div>
                    `;
                    stepsContainer.innerHTML += stepHTML;
                });

                resultsArea.classList.remove('hidden');
                resultsArea.classList.add('flex');

            } catch (error) {
                alert("Error generating protocol. Ensure your GROQ_API_KEY is in your .env file.");
                outputArea.classList.remove('hidden');
            } finally {
                btnText.innerText = "Generate IDSS Protocol";
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
